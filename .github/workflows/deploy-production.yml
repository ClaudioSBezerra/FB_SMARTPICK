name: Deploy to Production (Coolify + Hostinger)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Backup antes do deploy
  backup:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Backup Database
        run: |
          echo "🔄 Iniciando backup pré-deploy..."
          echo "Este step pode ser expandido com script de backup"
          echo "Data: $(date)"

  # Build e Push da imagem combinada (Coolify)
  build-and-push:
    needs: backup
    if: always() && (needs.backup.result == 'success' || needs.backup.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Build e Push das imagens separadas (Instalador)
  build-installer-images:
    needs: backup
    if: always() && (needs.backup.result == 'success' || needs.backup.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Deploy no servidor do cliente AWS (roda no self-hosted runner)
  deploy-cliente-aws:
    needs: build-installer-images
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, cliente-aws]

    steps:
      - name: Pull latest images
        working-directory: /opt/apps/fbtax/cliente-aws
        run: docker compose pull

      - name: Restart containers
        working-directory: /opt/apps/fbtax/cliente-aws
        run: docker compose up -d --force-recreate

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3006/api/health > /dev/null 2>&1; then
              echo "Deploy cliente-aws OK!"
              exit 0
            fi
            echo "Tentativa $i/20..."
            sleep 5
          done
          echo "Health check falhou."
          docker compose --project-directory /opt/apps/fbtax/cliente-aws logs api --tail 50
          exit 1

  # Notificação (Coolify deploya automaticamente via webhook próprio)
  notify:
    needs: [build-and-push, build-installer-images, deploy-cliente-aws]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deploy Notification
        run: |
          echo "🎉 Build concluído!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch/Tag: ${{ github.ref_name }}"
          echo "Data: $(date)"
          echo "Coolify faz deploy automático via webhook configurado na interface."