upstream backend {
    server api:8082;
}

server {
    listen 80;
    client_max_body_size 2048M;

    # Assets com hash no nome — cache longo; 404 real se não existir (não servir index.html como CSS)
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|svg|jpg|jpeg|gif|webp)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA — rotas sem extensão servem index.html; nunca cacheado
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 1200s;
        proxy_send_timeout 1200s;
        proxy_read_timeout 1200s;

        proxy_request_buffering off;
        proxy_http_version 1.1;
        client_body_timeout 1200s;
    }
}