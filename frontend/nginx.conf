upstream backend {
    server api:8082;
}

server {
    listen 80;
    client_max_body_size 2048M;
    root /usr/share/nginx/html;

    # ── API → Go backend ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 1200s;
        proxy_send_timeout 1200s;
        proxy_read_timeout 1200s;

        proxy_request_buffering off;
        proxy_http_version 1.1;
        client_body_timeout 1200s;
    }

    # ── Vite /assets/ — com hash no nome, cache longo ──────────────────────────
    # Assets imutáveis (ficam com hash no filename). Se não existir → 404 real.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── index.html e SPA fallback — nunca cachear ──────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        index index.html;
        # Tenta servir o arquivo direto (ex: /logo-fb.png, /favicon.ico);
        # se não existir e não tiver extensão, é rota SPA → index.html.
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}